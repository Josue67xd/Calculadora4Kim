<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #F092D5;
      --green: #99FFA0;
      --brown: #7A664D;
      --bg: #1a1410;
      --surface: #231d17;
      --surface2: #2e261e;
      --text: #f5ede6;
      --text-muted: #a89580;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -140px; left: -140px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, #F092D528 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -120px; right: -120px;
      width: 460px; height: 460px;
      background: radial-gradient(circle, #99FFA020 0%, transparent 70%);
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      text-align: center;
    }
    .tag {
      display: inline-block;
      background: var(--pink);
      color: var(--bg);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 18px;
      animation: fadeDown 0.5s ease both;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.2rem, 7vw, 3.8rem);
      line-height: 1.08;
      margin-bottom: 12px;
      animation: fadeDown 0.6s ease both;
    }
    h1 span { color: var(--pink); font-style: italic; }
    .subtitle {
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 0.5px;
      margin-bottom: 56px;
      animation: fadeDown 0.7s ease both;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      animation: fadeUp 0.7s ease both;
    }
    .menu-card {
      background: var(--surface);
      border: 1px solid #3a2f24;
      border-radius: 20px;
      padding: 36px 24px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .menu-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 20px;
    }
    .menu-card.pink::before  { background: radial-gradient(circle at 50% 0%, #F092D515, transparent 70%); }
    .menu-card.green::before { background: radial-gradient(circle at 50% 0%, #99FFA012, transparent 70%); }
    .menu-card:hover { transform: translateY(-4px); }
    .menu-card.pink:hover  { box-shadow: 0 12px 40px #F092D525; border-color: #F092D540; }
    .menu-card.green:hover { box-shadow: 0 12px 40px #99FFA020; border-color: #99FFA035; }
    .menu-card:hover::before { opacity: 1; }
    .menu-card:active { transform: scale(0.98); }

    .menu-icon {
      font-size: 38px;
      line-height: 1;
    }
    .menu-label {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--text);
    }
    .menu-card.pink  .menu-label { color: var(--pink); }
    .menu-card.green .menu-label { color: var(--green); }
    .menu-desc {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      line-height: 1.5;
      text-align: center;
    }

    .stats-bar {
      margin-top: 40px;
      background: var(--surface);
      border: 1px solid #3a2f24;
      border-radius: 14px;
      padding: 16px 24px;
      display: flex;
      justify-content: space-around;
      animation: fadeUp 0.85s ease both;
    }
    .stat { text-align: center; }
    .stat-val {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--green);
    }
    .stat-lbl {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .stat-divider {
      width: 1px;
      background: #3a2f24;
      align-self: stretch;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 420px) {
      .menu-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="tag">Sistema de Ventas</div>
  <h1>Menú <span>Inicio</span></h1>
  <p class="subtitle">Selecciona una opción para continuar.</p>

  <div class="menu-grid">    <a href="calculadora.html" class="menu-card pink">
      <div class="menu-icon">🧮</div>
      <div class="menu-label">Calculadora</div>
      <div class="menu-desc">Agrega productos, aplica descuentos y guarda la venta.</div>
    </a>
    <a href="registro.html" class="menu-card green">
      <div class="menu-icon">📋</div>
      <div class="menu-label">Registro</div>
      <div class="menu-desc">Consulta el historial de ventas guardadas con detalle completo.</div>
    </a>
  </div>

</div>

</body>
</html>
