<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora — Sistema de Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #F092D5;
      --brown: #7A664D;
      --green: #99FFA0;
      --bg: #1a1410;
      --surface: #231d17;
      --surface2: #2e261e;
      --text: #f5ede6;
      --text-muted: #a89580;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, #F092D530 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -100px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, #99FFA025 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid #3a2f24;
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 8px 16px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 28px;
      transition: border-color 0.2s, color 0.2s;
    }
    .back-btn:hover { border-color: #F092D560; color: var(--pink); }

    header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeDown 0.6s ease both;
    }
    header .tag {
      display: inline-block;
      background: var(--pink);
      color: var(--bg);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1.1;
    }
    header h1 span { color: var(--pink); font-style: italic; }
    header p { margin-top: 10px; color: var(--text-muted); font-size: 13px; letter-spacing: 0.5px; }

    .card {
      background: var(--surface);
      border: 1px solid #3a2f24;
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 16px;
      animation: fadeUp 0.5s ease both;
    }
    .card-title {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    input[type="text"], input[type="number"] {
      background: var(--surface2);
      border: 1px solid #3a2f24;
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input::placeholder { color: #5a4d3d; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px #F092D520; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      padding: 12px 22px;
      transition: transform 0.15s, box-shadow 0.15s;
      width: 100%;
    }
    .btn:active { transform: scale(0.97); }
    .btn-pink  { background: var(--pink);  color: var(--bg); }
    .btn-green { background: var(--green); color: var(--bg); margin-top: 10px; }
    .btn-blue  { background: #6090F0; color: #fff; margin-top: 10px; }
    .btn-pink:hover  { box-shadow: 0 4px 20px #F092D540; }
    .btn-green:hover { box-shadow: 0 4px 20px #99FFA050; }
    .btn-blue:hover  { box-shadow: 0 4px 20px #6090F040; }
    .btn-outline {
      background: transparent;
      border: 1px solid #3a2f24;
      color: var(--text-muted);
      font-size: 12px;
      padding: 8px 16px;
      width: auto;
    }
    .btn-outline:hover { border-color: #F092D560; color: var(--pink); }
    .btn-danger {
      background: transparent;
      border: 1px solid #5a1a1a;
      color: #d06060;
      padding: 6px 12px;
      font-size: 11px;
      border-radius: 8px;
      width: auto;
    }
    .btn-danger:hover { background: #3a1010; }

    /* Pago toggle */
    .pago-toggle {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }
    .pago-btn {
      flex: 1;
      background: var(--surface2);
      border: 1px solid #3a2f24;
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 11px 8px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      letter-spacing: 0.5px;
    }
    .pago-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: #1a3a1e;
    }
    .pago-btn:hover:not(.active) { border-color: #F092D560; color: var(--pink); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .product-list { display: flex; flex-direction: column; gap: 10px; }
    .product-item {
      background: var(--surface2);
      border: 1px solid #3a2f24;
      border-radius: 12px;
      padding: 14px 16px;
      animation: fadeUp 0.3s ease both;
    }
    .product-name { font-size: 14px; color: var(--text); font-weight: 500; }
    .product-detail {
      display: flex;
      gap: 10px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .det-disc  { color: var(--pink); }
    .det-final { color: var(--green); font-weight: 500; }
    .product-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .product-final {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--green);
      flex-shrink: 0;
      margin-left: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 32px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; display: block; }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, #3a2f24, transparent);
      margin: 20px 0;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
    }
    .summary-row .key {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .summary-row .val {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--text);
    }
    .summary-row.total .val { font-size: 30px; color: var(--green); }
    .summary-row .savings-val {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--pink);
    }

    .tier-bar {
      background: var(--surface2);
      border: 1px solid #3a2f24;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 14px;
    }
    .tier-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .tier-bar-header span { color: var(--pink); }
    .tier-track { position: relative; height: 8px; background: #3a2f24; border-radius: 100px; overflow: hidden; }
    .tier-fill {
      position: absolute; top: 0; left: 0;
      height: 100%; border-radius: 100px;
      background: linear-gradient(to right, var(--pink), var(--green));
      transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tier-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: #5a4d3d; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 100px;
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <a href="index.html" class="back-btn">← Inicio</a>

  <header>
    <div class="tag">Calculadora</div>
    <h1>Descuentos <span>Inteligentes</span></h1>
    <p>Calcula precio con descuentos.</p>
  </header>

  <!-- Cliente -->
  <div class="card" style="animation-delay:0.05s">
    <div class="card-title">👤 Datos del Cliente</div>
    <div class="form-row">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="clientName" placeholder="Escribe el nombre aquí" autocapitalize="words"/>
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="clientPhone" placeholder="+502 0000-0000" maxlength="14" oninput="formatPhone(this)"/>
      </div>
    </div>
    <div class="form-row" style="margin-bottom:0">
      <div class="form-group">
        <label>NIT</label>
        <input type="text" id="clientNit" placeholder="12345678-9"/>
      </div>
      <div class="form-group">
        <label>Forma de pago</label>
        <div class="pago-toggle">
          <button type="button" class="pago-btn active" id="pagoEfectivo" onclick="setPago('Efectivo')">💵 Efectivo</button>
          <button type="button" class="pago-btn" id="pagoTarjeta" onclick="setPago('Tarjeta')">💳 Tarjeta</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Agregar producto -->
  <div class="card" style="animation-delay:0.1s">
    <div class="card-title">➕ Agregar Producto</div>
    <div class="form-row">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="productName" placeholder="Escribe el producto aquí"/>
      </div>
      <div class="form-group">
        <label>Precio unitario (Q)</label>
        <input type="number" id="productPrice" placeholder="0.00" min="0" step="0.01"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="productQty" placeholder="1" min="1" value="1"/>
      </div>
      <div class="form-group">
        <label>Descuento (%)</label>
        <input type="number" id="productDiscount" placeholder="0" min="0" max="100" value="15"/>
      </div>
    </div>
    <button class="btn btn-pink" onclick="addProduct()">＋ Agregar al carrito</button>
  </div>

  <!-- Carrito -->
  <div class="card" style="animation-delay:0.2s">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div class="card-title" style="margin-bottom:0">🛒 Carrito</div>
      <button class="btn btn-outline" onclick="clearAll()">Vaciar</button>
    </div>
    <div class="product-list" id="productList">
      <div class="empty-state">
        <span class="icon">🛍️</span>
        Aún no hay productos. ¡Agrega uno arriba!
      </div>
    </div>
  </div>

  <!-- Resumen -->
  <div class="card" style="animation-delay:0.3s" id="summaryCard">
    <div class="card-title">📊 Resumen</div>
    <div class="summary-row">
      <span class="key">Subtotal</span>
      <span class="val" id="subtotalDisplay">Q 0</span>
    </div>
    <div class="summary-row">
      <span class="key">Descuento productos</span>
      <span class="savings-val" id="itemDiscountDisplay">– Q 0</span>
    </div>
    <div class="divider"></div>
    <div class="summary-row">
      <span class="key">Ahorro total</span>
      <span class="savings-val" id="totalSavingsDisplay">– Q 0</span>
    </div>
    <div class="summary-row total">
      <span class="key" style="font-size:13px;">Total a pagar</span>
      <span class="val" id="totalDisplay">Q 0</span>
    </div>

    <!-- Tier bar eliminado -->

    <button class="btn btn-green" id="saveBtn" onclick="saveVenta()">💾 Guardar venta</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let products = [];
  let formaPago = 'Efectivo';

  function setPago(tipo) {
    formaPago = tipo;
    document.getElementById('pagoEfectivo').classList.toggle('active', tipo === 'Efectivo');
    document.getElementById('pagoTarjeta').classList.toggle('active',  tipo === 'Tarjeta');
  }

  function fmt(n) { return 'Q ' + Math.round(n).toLocaleString('es-GT'); }
  function roundUp5(n) { return Math.ceil(n / 5) * 5; }

  function addProduct() {
    const name     = document.getElementById('productName').value.trim() || 'Producto';
    const price    = parseFloat(document.getElementById('productPrice').value) || 0;
    const qty      = parseInt(document.getElementById('productQty').value) || 1;
    const discount = Math.min(100, Math.max(0, parseFloat(document.getElementById('productDiscount').value) || 0));
    if (price <= 0) {
      const el = document.getElementById('productPrice');
      el.focus(); el.style.borderColor = 'var(--pink)';
      setTimeout(() => el.style.borderColor = '', 1500);
      return;
    }
    products.push({ id: Date.now(), name, price, qty, discount });
    document.getElementById('productName').value     = '';
    document.getElementById('productPrice').value    = '';
    document.getElementById('productQty').value      = '1';
    document.getElementById('productDiscount').value = '15';
    render();
  }

  function removeProduct(id) {
    products = products.filter(p => p.id !== id);
    render();
  }

  function clearAll() {
    products = [];
    render();
  }

  function calcProduct(p) {
    const unitFinalR = roundUp5(p.price * (1 - p.discount / 100));
    const finalR     = unitFinalR * p.qty;
    const unitDisc   = Math.round(p.price) - unitFinalR;
    return { unitFinalR, finalR, unitDisc };
  }

  function render() {
    const list = document.getElementById('productList');
    if (products.length === 0) {
      list.innerHTML = `<div class="empty-state"><span class="icon">🛍️</span>Aún no hay productos. ¡Agrega uno arriba!</div>`;
    } else {
      list.innerHTML = products.map(p => {
        const { unitFinalR, finalR, unitDisc } = calcProduct(p);
        return `
          <div class="product-item">
            <div class="product-row">
              <div>
                <div class="product-name">${p.name}</div>
                <div class="product-detail">
                  <span>Precio: Q ${Math.round(p.price).toLocaleString('es-GT')}</span>
                  <span>Cant: ${p.qty}</span>
                  ${p.discount > 0 ? `<span class="det-disc">Desc. ${p.discount}%</span>` : ''}
                  ${p.discount > 0 ? `<span class="det-disc">– Q ${(unitDisc * p.qty).toLocaleString('es-GT')}</span>` : ''}
                  <span class="det-final">C/u: Q ${unitFinalR.toLocaleString('es-GT')}</span>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
                <div class="product-final">Q ${finalR.toLocaleString('es-GT')}</div>
                <button class="btn btn-danger" onclick="removeProduct(${p.id})">✕</button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    let subtotal = 0, totalFinal = 0;
    products.forEach(p => {
      const { finalR } = calcProduct(p);
      subtotal   += p.price * p.qty;
      totalFinal += finalR;
    });
    const itemDiscount = subtotal - totalFinal;

    document.getElementById('subtotalDisplay').textContent     = fmt(subtotal);
    document.getElementById('itemDiscountDisplay').textContent = '– Q ' + Math.round(itemDiscount).toLocaleString('es-GT');
    document.getElementById('totalSavingsDisplay').textContent = '– Q ' + Math.round(itemDiscount).toLocaleString('es-GT');
    document.getElementById('totalDisplay').textContent        = 'Q ' + totalFinal.toLocaleString('es-GT');
  }

  function saveVenta() {
    if (products.length === 0) { showToast('⚠️ Agrega al menos un producto'); return; }

    let subtotal = 0, totalFinal = 0;
    products.forEach(p => {
      const { finalR } = calcProduct(p);
      subtotal   += p.price * p.qty;
      totalFinal += finalR;
    });
    const descuento = subtotal - totalFinal;

    const now    = new Date();
    const venta  = {
      id:       now.getTime(),
      fecha:    now.toLocaleDateString('es-GT'),
      hora:     now.toLocaleTimeString('es-GT', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
      cliente: {
        nombre:   document.getElementById('clientName').value.trim(),
        telefono: document.getElementById('clientPhone').value.trim(),
        nit:      document.getElementById('clientNit').value.trim(),
      },
      formaPago: formaPago,
      productos: products.map(p => {
        const { unitFinalR, finalR, unitDisc } = calcProduct(p);
        return { ...p, unitFinalR, finalR, unitDisc };
      }),
      subtotal:  Math.round(subtotal),
      descuento: Math.round(descuento),
      total:     totalFinal,
    };

    const ventas = JSON.parse(localStorage.getItem('ventas') || '[]');
    ventas.unshift(venta);
    localStorage.setItem('ventas', JSON.stringify(ventas));

    showToast('✅ Venta guardada correctamente');

    // Reset
    products = [];
    formaPago = 'Efectivo';
    setPago('Efectivo');
    document.getElementById('clientName').value  = '';
    document.getElementById('clientPhone').value = '';
    document.getElementById('clientNit').value   = '';
    render();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  async function downloadSummary() {
    if (products.length === 0) return;
    const btn = document.getElementById('downloadBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Generando imagen...';
    try {
      const clientName  = document.getElementById('clientName').value.trim();
      const clientPhone = document.getElementById('clientPhone').value.trim();
      const clientNit   = document.getElementById('clientNit').value.trim();
      let subtotal = 0, totalFinal = 0;
      products.forEach(p => {
        const { finalR } = calcProduct(p);
        subtotal += p.price * p.qty; totalFinal += finalR;
      });
      const itemDiscount = subtotal - totalFinal;
      drawCanvas({ clientName, clientPhone, clientNit, subtotal, totalFinal, itemDiscount, products, download: true });
    } catch(e) { alert('No se pudo generar la imagen.'); }
    btn.disabled = false;
    btn.textContent = '⬇ Descargar resumen PNG';
  }

  function drawCanvas({ clientName, clientPhone, clientNit, subtotal, totalFinal, itemDiscount, products, download }) {
    const scale = 2, W = 560, pad = 36;
    const hasClient = clientName || clientPhone || clientNit;
    let clientLines = 0;
    if (clientName)  clientLines++;
    if (clientPhone) clientLines++;
    if (clientNit)   clientLines++;
    const clientH   = hasClient ? 28 + clientLines * 18 + 26 : 0;
    const prodRowH  = 64;
    const H = pad + 28 + 16 + clientH
            + products.length * prodRowH + 16
            + 1 + 20 + 40 + 40 + 40 + 54 + 40 + pad;

    const canvas = document.createElement('canvas');
    canvas.width = W * scale; canvas.height = H * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);

    ctx.fillStyle = '#231d17'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#3a2f24'; ctx.lineWidth = 1;
    roundRect(ctx, 0.5, 0.5, W-1, H-1, 16); ctx.stroke();

    let y = pad;
    ctx.fillStyle = '#a89580'; ctx.font = '500 10px monospace'; ctx.letterSpacing = '2.5px';
    ctx.fillText('RESUMEN DE VENTA', pad, y); y += 16;
    ctx.strokeStyle = '#3a2f24'; ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W-pad, y); ctx.stroke(); y += 16;

    if (hasClient) {
      ctx.fillStyle = '#F092D5'; ctx.font = '500 10px monospace'; ctx.letterSpacing = '1.5px';
      ctx.fillText('CLIENTE', pad, y+2); y += 18;
      ctx.fillStyle = '#f5ede6'; ctx.font = '13px monospace'; ctx.letterSpacing = '0px';
      if (clientName)  { ctx.fillText('Nombre:  ' + clientName,  pad, y); y += 18; }
      if (clientPhone) { ctx.fillText('Tel:     ' + clientPhone, pad, y); y += 18; }
      if (clientNit)   { ctx.fillText('NIT:     ' + clientNit,   pad, y); y += 18; }
      y += 10;
      ctx.strokeStyle = '#3a2f24'; ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W-pad, y); ctx.stroke(); y += 16;
    }

    ctx.fillStyle = '#a89580'; ctx.font = '500 9px monospace'; ctx.letterSpacing = '1.5px';
    ctx.fillText('PRODUCTOS', pad, y); y += 14;

    products.forEach(p => {
      const unitFinalR = roundUp5(p.price * (1 - p.discount / 100));
      const finalR     = unitFinalR * p.qty;
      const unitDisc   = Math.round(p.price) - unitFinalR;
      ctx.fillStyle = '#f5ede6'; ctx.font = 'bold 13px monospace'; ctx.letterSpacing = '0px';
      ctx.fillText(p.name + (p.qty > 1 ? '  ×'+p.qty : ''), pad, y+14);
      ctx.fillStyle = '#99FFA0'; ctx.font = 'bold 16px monospace';
      const fs = 'Q ' + finalR.toLocaleString('es-GT');
      ctx.fillText(fs, W - pad - ctx.measureText(fs).width, y+14);
      ctx.fillStyle = '#a89580'; ctx.font = '11px monospace'; ctx.letterSpacing = '0px';
      const detail = `Precio: Q ${Math.round(p.price).toLocaleString('es-GT')}   Cant: ${p.qty}` +
        (p.discount > 0 ? `   Desc. ${p.discount}%: – Q ${(unitDisc*p.qty).toLocaleString('es-GT')}   C/u: Q ${unitFinalR.toLocaleString('es-GT')}` : '');
      ctx.fillText(detail, pad, y+32);
      ctx.strokeStyle = '#2e261e'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(pad, y+prodRowH-2); ctx.lineTo(W-pad, y+prodRowH-2); ctx.stroke();
      y += prodRowH;
    });

    y += 16;
    ctx.strokeStyle = '#3a2f24'; ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W-pad, y); ctx.stroke(); y += 20;

    const rows = [
      { label:'SUBTOTAL',      val:'Q '+Math.round(subtotal).toLocaleString('es-GT'),    color:'#f5ede6', rh:40 },
      { label:'DESCUENTO',     val:'– Q '+Math.round(itemDiscount).toLocaleString('es-GT'), color:'#F092D5', rh:40 },
      { label:'AHORRO TOTAL',  val:'– Q '+Math.round(itemDiscount).toLocaleString('es-GT'), color:'#F092D5', rh:40 },
      { label:'TOTAL A PAGAR', val:'Q '+totalFinal.toLocaleString('es-GT'),               color:'#99FFA0', rh:54, big:true },
    ];
    rows.forEach(r => {
      ctx.fillStyle = '#a89580'; ctx.font = '500 9px monospace'; ctx.letterSpacing = '1.5px';
      ctx.fillText(r.label, pad, y+(r.big?22:16));
      ctx.fillStyle = r.color; ctx.font = r.big ? 'bold 28px serif' : '15px serif'; ctx.letterSpacing = '0px';
      const vw = ctx.measureText(r.val).width;
      ctx.fillText(r.val, W-pad-vw, y+(r.big?24:16));
      y += r.rh;
    });

    const now = new Date();
    const fechaHora = now.toLocaleDateString('es-GT') + '  ' + now.toLocaleTimeString('es-GT', {hour:'2-digit',minute:'2-digit'});
    ctx.fillStyle = '#5a4d3d'; ctx.font = '10px monospace'; ctx.letterSpacing = '0.5px';
    const fhw = ctx.measureText(fechaHora).width;
    ctx.fillText(fechaHora, W-pad-fhw, H-pad/2);

    if (download) {
      const link = document.createElement('a');
      link.download = 'resumen-venta.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    return canvas;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }

  // Auto-capitalize each word in name field
  document.getElementById('clientName').addEventListener('input', function() {
    const pos = this.selectionStart;
    this.value = this.value.replace(/\b\w/g, c => c.toUpperCase());
    this.setSelectionRange(pos, pos);
  });

  // Phone formatter: +502 XXXX-XXXX
  function formatPhone(input) {
    let digits = input.value.replace(/\D/g, '');
    // Remove leading 502 if user typed it
    if (digits.startsWith('502')) digits = digits.slice(3);
    digits = digits.slice(0, 8);
    let formatted = '';
    if (digits.length === 0) {
      formatted = '';
    } else if (digits.length <= 4) {
      formatted = '+502 ' + digits;
    } else {
      formatted = '+502 ' + digits.slice(0, 4) + '-' + digits.slice(4);
    }
    input.value = formatted;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') addProduct(); });
</script>
